version: 1
name: metrics_ci_smoke_nonfred
created: "2026-02-11"
description: >
  CI smoke spec for the non-FRED DataHub price-index path. Exercises
  ingest -> compute -> validate beyond FRED-only paths.

sources:
  datahub_sp500:
    kind: datahub_csv
    url: "https://datahub.io/core/s-and-p-500/_r/-/data/data.csv"
    homepage: "https://datahub.io/core/s-and-p-500"
    license: ODC-PDDL-1.0

series:
  sp500_sp500_index:
    source: datahub_sp500
    frequency: M
    units: "index"
    date_column: Date
    value_column: SP500
    description: "Monthly S&P 500/composite price level (excludes dividends)."
    filters:
      start_date: "1957-01-01"

metrics:
  - id: sp500_term_pct_change
    family: stock_levels
    label: "S&P 500 monthly price percent change (term total)"
    inputs:
      series: sp500_sp500_index
    period_transform:
      kind: identity
    term_aggregation:
      kind: pct_change_from_levels
      scale: 100
      units: "percent"

  - id: sp500_term_cagr_pct
    family: stock_levels
    label: "S&P 500 monthly price CAGR"
    inputs:
      series: sp500_sp500_index
    period_transform:
      kind: identity
    term_aggregation:
      kind: cagr_from_levels
      scale: 100
      use_actual_time: true
      units: "percent"
